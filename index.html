<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сравнение яркости</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #050505, #1a1a1a);
    color: white;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 430px;
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0 0 14px;
    font-size: 26px;
    font-weight: 700;
  }

  .top-text {
    margin-bottom: 14px;
    font-size: 15px;
    color: #cccccc;
  }

  .camera-box {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 24px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 20px 50px rgba(0,0,0,.6);
    border: 2px solid rgba(255,255,255,.12);
  }

  video,
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  button {
    margin-top: 18px;
    padding: 14px 26px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #00ff88, #00b7ff);
    color: black;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(0,255,170,.35);
  }

  button:active {
    transform: scale(.97);
  }

  .result {
    margin-top: 22px;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: .4px;
  }

  .bottom-text {
    margin-top: 10px;
    font-size: 14px;
    color: #aaaaaa;
  }
</style>
</head>

<body>

<div class="app">

  <h1>Сравнение яркости</h1>

  <div class="top-text">
    Наведите камеру на объект и сравните две вертикальные области
  </div>

  <div class="camera-box">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <button id="startBtn">Открыть камеру</button>

  <div class="result" id="result">
    Камера не открыта
  </div>

  <div class="bottom-text">
    Показывается, на сколько процентов одна линия ярче второй
  </div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");

const hiddenCanvas = document.createElement("canvas");
const hiddenCtx = hiddenCanvas.getContext("2d");

const lines = [
  { x: 38, y1: 25, y2: 75 },
  { x: 62, y1: 25, y2: 75 }
];

let cameraStarted = false;

startBtn.addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" }
      },
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      cameraStarted = true;
      startBtn.style.display = "none";
      loop();
    };

  } catch (err) {
    result.textContent = "Ошибка открытия камеры";
    alert("Ошибка камеры: " + err.message);
  }
});

function resizeCanvas() {
  const box = canvas.getBoundingClientRect();

  canvas.width = box.width;
  canvas.height = box.height;

  hiddenCanvas.width = video.videoWidth;
  hiddenCanvas.height = video.videoHeight;
}

function getBrightness(line) {
  const w = hiddenCanvas.width;
  const h = hiddenCanvas.height;

  const x = Math.round(line.x / 100 * w);
  const y1 = line.y1 / 100 * h;
  const y2 = line.y2 / 100 * h;

  const steps = 120;
  let total = 0;

  for (let i = 0; i < steps; i++) {
    const t = i / (steps - 1);
    const y = Math.round(y1 + (y2 - y1) * t);

    const pixel = hiddenCtx.getImageData(x, y, 1, 1).data;

    const r = pixel[0];
    const g = pixel[1];
    const b = pixel[2];

    total += 0.299 * r + 0.587 * g + 0.114 * b;
  }

  return total / steps;
}

function drawLine(line) {
  const w = canvas.width;
  const h = canvas.height;

  const x = line.x / 100 * w;
  const y1 = line.y1 / 100 * h;
  const y2 = line.y2 / 100 * h;

  ctx.lineWidth = 5;
  ctx.lineCap = "round";
  ctx.strokeStyle = "rgba(0, 255, 150, .95)";

  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();
}

function loop() {
  if (!cameraStarted) return;

  if (video.videoWidth && video.videoHeight) {
    resizeCanvas();

    hiddenCtx.drawImage(
      video,
      0,
      0,
      hiddenCanvas.width,
      hiddenCanvas.height
    );

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawLine(lines[0]);
    drawLine(lines[1]);

    const brightness1 = getBrightness(lines[0]);
    const brightness2 = getBrightness(lines[1]);

    const max = Math.max(brightness1, brightness2);
    const min = Math.min(brightness1, brightness2);

    let percent = 0;

    if (min > 0) {
      percent = ((max - min) / min) * 100;
    }

    if (brightness1 > brightness2) {
      result.textContent = `Левая ярче на ${percent.toFixed(1)}%`;
    } else if (brightness2 > brightness1) {
      result.textContent = `Правая ярче на ${percent.toFixed(1)}%`;
    } else {
      result.textContent = `Яркость одинаковая`;
    }
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
